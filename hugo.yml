baseURL: 'https://33sakib33.github.io/'
languageCode: 'en-us'
title: 'S-Thoughts'
module:
  imports:
  - path: github.com/adityatelange/hugo-PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production
  title: S-Thoughts
  description: "Personal blog and portfolio of Nazmus Sakib Ahmed — Deep Learning researcher, Lecturer at BRAC University, and writer."
  keywords: [Blog, Portfolio, Machine Learning, Deep Learning, Research, AI, Fiction, Writing]
  author: "Nazmus Sakib Ahmed"
  images: ["/images/og-image.png"]
  DateFormat: "January 2, 2006"
  defaultTheme: auto
  disableThemeToggle: false

  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: false
  hidemeta: false
  hideSummary: false
  showtoc: true
  tocopen: false

  assets:
    favicon: "/images/favicon.ico"
    favicon16x16: "/images/favicon-16x16.png"
    favicon32x32: "/images/favicon-32x32.png"
    apple_touch_icon: "/images/apple-touch-icon.png"

  label:
    text: "S-Thoughts"
    iconHeight: 35

  profileMode:
    enabled: true
    title: Nazmus Sakib Ahmed
    subtitle: "Researching how AI learns. Building with it. Teaching it."
    imageUrl: "/images/profile.jpg"
    imageWidth: 140
    imageHeight: 140
    imageTitle: Nazmus Sakib Ahmed
    buttons:
      - name: Blog
        url: /posts/
      - name: Projects
        url: /projects/
      - name: About
        url: /about/

  homeInfoParams:
    Title: "Trying to Focus"
    Content: Welcome to my blog

  socialIcons:
    - name: linkedin
      url: "https://www.linkedin.com/in/33sakib33/"
    - name: github
      url: "https://github.com/33sakib33"
    - name: rss
      url: "/index.xml"

  analytics:
    google:
      SiteVerificationTag: ""
    bing:
      SiteVerificationTag: ""

  cover:
    hidden: false
    hiddenInList: false
    hiddenInSingle: false

  editPost:
    URL: "https://github.com/33sakib33/33sakib33.github.io/blob/master/content"
    Text: "Suggest Changes"
    appendFilePath: true

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    limit: 10
    keys: ["title", "permalink", "summary", "content"]

menu:
  main:
    - identifier: blog
      name: Blog
      url: /posts/
      weight: 10
    - identifier: projects
      name: Projects
      url: /projects/
      weight: 20
    - identifier: about
      name: About
      url: /about/
      weight: 30

pygmentsUseClasses: true
markup:
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false

outputs:
  home:
    - HTML
    - RSS
    - JSON
